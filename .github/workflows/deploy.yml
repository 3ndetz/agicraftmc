name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Server
    runs-on: self-hosted
    # PROD_DIR: set via GitHub secret (Settings → Secrets), falls back to default Windows path
    env:
      PROD_DIR: ${{ secrets.PROD_DIR || '/d/Repos/NettyanMC' }}
    if: "github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')"

    defaults:
      run:
        # Git Bash on Windows. On Linux just remove this line — /bin/bash is used automatically.
        shell: '"C:\Program Files\Git\bin\bash.exe" --noprofile --norc -eo pipefail {0}'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # needed to diff HEAD^ HEAD

      - name: Detect changed services
        id: changes
        run: |
          echo "======================================"
          echo "Detecting changed services..."
          echo "======================================"

          # workflow_dispatch = manual trigger, restart everything
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger — restarting all services"
            echo "restart=all" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED=$(git diff HEAD^ HEAD --name-only 2>/dev/null || echo "all")
          echo "Changed files:"
          echo "$CHANGED"

          # Full restart if docker-compose or shared plugins changed
          if echo "$CHANGED" | grep -qE "^docker-compose\.yml|^plugins-common/"; then
            echo "Core files changed — restarting all services"
            echo "restart=all" >> $GITHUB_OUTPUT
            exit 0
          fi

          RESTART=""
          BUILD=""

          echo "$CHANGED" | grep -q "^ai_research/"   && RESTART="$RESTART airesearch"
          echo "$CHANGED" | grep -q "^velocity/"       && RESTART="$RESTART velocity"
          echo "$CHANGED" | grep -q "^lobby/"          && RESTART="$RESTART lobby"
          echo "$CHANGED" | grep -q "^limbo/"          && RESTART="$RESTART limbo"
          echo "$CHANGED" | grep -q "^survival/"       && RESTART="$RESTART survival survivalplus"
          echo "$CHANGED" | grep -q "^survival_plus/"  && RESTART="$RESTART survivalplus"
          if echo "$CHANGED" | grep -q "^backend/"; then
            RESTART="$RESTART backend"
            BUILD="$BUILD backend"
          fi
          if echo "$CHANGED" | grep -q "^frontend/"; then
            RESTART="$RESTART frontend"
            BUILD="$BUILD frontend"
          fi

          echo "restart=$RESTART" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "Services to restart: '$RESTART'"
          echo "Services to build:   '$BUILD'"

      - name: Sync files to production
        shell: bash
        run: |
          PROD_DIR="${PROD_DIR:-/d/Repos/NettyanMC}"
          echo "======================================"
          echo "Syncing to: $PROD_DIR"
          echo "======================================"

          mkdir -p "$PROD_DIR"

          for item in gobetween.toml docker-compose.yml .github \
                      velocity survival lobby limbo ai_research \
                      backend frontend survival_plus plugins-common; do
            if [ -e "$item" ]; then
              cp -rf "$item" "$PROD_DIR/"
              echo "  synced: $item"
            fi
          done

      - name: Build services
        shell: bash
        run: |
          PROD_DIR="${PROD_DIR:-/d/Repos/NettyanMC}"
          cd "$PROD_DIR"

          BUILD="${{ steps.changes.outputs.build }}"
          RESTART="${{ steps.changes.outputs.restart }}"

          # Build images for services that need it
          if [ "$RESTART" = "all" ]; then
            echo "Building all services..."
            docker compose build --no-cache frontend backend
            docker compose build
          elif [ -n "$BUILD" ]; then
            echo "Building:$BUILD"
            docker compose build --no-cache $BUILD
          else
            echo "No builds needed"
          fi

      - name: Restart services
        shell: bash
        run: |
          PROD_DIR="${PROD_DIR:-/d/Repos/NettyanMC}"
          cd "$PROD_DIR"

          RESTART="${{ steps.changes.outputs.restart }}"

          if [ "$RESTART" = "all" ]; then
            echo "Full restart..."
            docker compose up -d --remove-orphans
          elif [ -n "$RESTART" ]; then
            echo "Restarting:$RESTART"
            docker compose up -d --remove-orphans $RESTART
          else
            echo "No services need restart"
          fi

          echo "======================================"
          docker compose ps
          echo "======================================"

      - name: Notify on failure
        if: failure()
        shell: bash
        run: echo "Deployment failed! Check the logs above."
