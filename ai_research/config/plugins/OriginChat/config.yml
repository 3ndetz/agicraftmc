license: ''

# General plugin settings
settings:
  # Enable/disable debug messages
  debug: false
  # Plugin prefix in messages
  prefix: '&7[&fOriginChat&7]'
  # Automatic update checker via Spigot API
  update-checker:
    enabled: true

# Locale settings
locale:
  # Default language (ru_ru, en_us, uk_ua, de_de)
  default: ru_ru

# Chat formatting settings

# Module settings
modules:
  # Module status (true - enabled, false - disabled)
  chat: true
  tab: true
  name_tags: true
  private_messages: true
  roleplay: true
  server_messages: true
  locale_advancements: true
  locale_deaths: true
  scoreboard: true
  server_brand: true
  mentions: true
  player_info: true
  emoji: true
  chat_bubbles: true
  bed_messages: true
  afk: true
  book_formatting: true
  sign_formatting: true
  item_formatting: true
  auto_messages: true

